<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I feel too deep of longing</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Iklan diposisikan agar tidak merusak estetika */
        .ad-banner {
            margin-bottom: 20px;
            opacity: 0.7;
            transition: opacity 0.3s;
        }
        .ad-banner:hover { opacity: 1; }

        .container {
            width: 90%;
            max-width: 800px;
            text-align: center;
            animation: fadeIn 1.5s ease-in-out;
        }

        .video-wrapper {
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .video-wrapper:hover {
            transform: scale(1.01);
        }

        video {
            width: 100%;
            border-radius: 12px;
            display: block;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .title-text {
            margin-top: 30px;
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 2px 10px rgba(255,255,255,0.2);
        }

        .subtitle {
            font-size: 0.9rem;
            color: #666;
            margin-top: 5px;
            font-style: italic;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsif untuk HP */
        @media (max-width: 600px) {
            .title-text { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<script async="async" data-cfasync="false" src="https://hypothesisgarden.com/c41a23ff90a4cb9a439bd54b5d951bc3/invoke.js"></script>
<div id="container-c41a23ff90a4cb9a439bd54b5d951bc3"></div>


    <div class="container">
        <div class="video-wrapper">
            <video controls poster="" preload="metadata">
                <source src="https://cdn2.videy.co/YuRt4Eow1.mp4" type="video/mp4">
                Browser Anda tidak mendukung video HTML5.
            </video>
        </div>
        
        <div class="title-text">I feel too deep of longing</div>
        <div class="subtitle">Sebuah kerinduan yang tak terucap...</div>
    </div>



</body>
</html>
